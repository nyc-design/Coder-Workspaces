# Append this service to the host docker-compose on the Coder VM.
#
# agentmemory is the persistent memory backend that any MCP client — chatd
# inside workspaces, Claude Desktop, Cursor, in-workspace CLIs, etc. — can
# talk to. Holds session observations, embeddings, and lifecycle metadata
# across workspace recreate.
#
# Storage backend is chosen at startup by the bundled docker-entrypoint.sh:
#   UPSTASH_REDIS_URL set in .env → Redis (state/stream/cron all on Upstash)
#   UPSTASH_REDIS_URL unset       → file-based on /data named volume
#
# Public access: the MCP streamable_http bridge (port 3114) is exposed via
# Traefik at https://memory.tapiavala.com/mcp, gated by Bearer auth using
# AGENTMEMORY_SECRET. ALL clients (including chatd inside workspaces) go
# through this public URL with the same Bearer — one auth boundary, one
# threat model. The raw REST API on 3111 and the streams/viewer ports stay
# docker-network-only since no off-the-shelf client speaks those shapes.
#
# Required env in the host .env:
#   AGENTMEMORY_SECRET  — Bearer token for every REST + MCP endpoint.
#                         Generate with `openssl rand -hex 32` and pull
#                         from GCP Secret Manager. Same value must be
#                         configured on every MCP client
#                         (`Authorization: Bearer <secret>`).
#
# Optional env in the host .env:
#   UPSTASH_REDIS_URL  — full rediss:// URL from your Upstash console.
#                        Format: rediss://default:PASSWORD@HOST:6379
#                        Free tier (10k commands/day, 256MB) covers ~45
#                        single-agent sessions per day. Pull from GCP
#                        Secret Manager.

services:
  agentmemory:
    image: ghcr.io/nyc-design/agentmemory:latest
    container_name: agentmemory
    restart: unless-stopped
    environment:
      # Bearer secret. Setting this turns on upstream agentmemory's
      # middleware::api-auth across every REST + MCP endpoint (verified in
      # rohitg00/agentmemory src/triggers/api.ts + src/mcp/server.ts).
      # The mcp-http-bridge forwards inbound Authorization headers verbatim,
      # so the same secret protects port 3114 too.
      AGENTMEMORY_SECRET: ${AGENTMEMORY_SECRET:?set in .env}
      # Empty default = file-based fallback. Set in .env to switch to Upstash.
      UPSTASH_REDIS_URL: ${UPSTASH_REDIS_URL:-}

      # Local embeddings, reranking, image embeddings.
      # Free (no LLM calls). Powered by @xenova/transformers baked into the
      # image. ~300-500 MB resident RAM total; models download on first use
      # into /data/.cache/huggingface and survive image swaps via the volume.
      # Verified flags in upstream rohitg00/agentmemory:
      #   EMBEDDING_PROVIDER             src/embeddings/factory.ts
      #   RERANK_ENABLED                 src/rerank/index.ts
      #   AGENTMEMORY_IMAGE_EMBEDDINGS   src/embeddings/clip.ts
      EMBEDDING_PROVIDER: local
      RERANK_ENABLED: "true"
      AGENTMEMORY_IMAGE_EMBEDDINGS: "true"

      # LLM-bound phase: auto-compress, consolidation, graph extraction,
      # slots, reflection. All read the ANTHROPIC_* config block below.
      # Per-observation LLM cost is small (Haiku 4.5 on short fixed-shape
      # summarize / extract prompts). Skill extraction during consolidation
      # is automatic once CONSOLIDATION_ENABLED is on — no separate flag.
      #
      # Verified flags in upstream:
      #   AGENTMEMORY_AUTO_COMPRESS      src/auto-compress.ts
      #   CONSOLIDATION_ENABLED          src/consolidation-pipeline.ts
      #   GRAPH_EXTRACTION_ENABLED       src/graph-extraction.ts
      #   AGENTMEMORY_SLOTS              src/functions/slots.ts:99
      #   AGENTMEMORY_REFLECT            src/functions/reflect.ts (gated on SLOTS)
      AGENTMEMORY_AUTO_COMPRESS: "true"
      CONSOLIDATION_ENABLED: "true"
      GRAPH_EXTRACTION_ENABLED: "true"
      AGENTMEMORY_SLOTS: "true"
      AGENTMEMORY_REFLECT: "true"

      # LLM provider routing.
      # Agentmemory's internal LLM calls flow through the existing
      # Headroom (compression) -> OmniRoute (routing) gateway, root-mounted
      # on llm.tapiavala.com. Same LLM_GATEWAY_API_KEY chatd uses, so no
      # new secret to provision. Anthropic SDK posts to
      # ${ANTHROPIC_BASE_URL}/v1/messages; Headroom is the first hop and
      # inherits the same compression / metering / fallback policy as
      # user-facing traffic.
      #
      # Model: meridian/claude-haiku-4-5 — OmniRoute resolves the alias
      # to its meridian provider (Claude Code SDK, Pro/Max OAuth-backed).
      # Haiku 4.5 is the right tier for these calls (short, fixed-shape
      # summarize / extract / cluster-synthesize prompts).
      ANTHROPIC_API_KEY: ${LLM_GATEWAY_API_KEY:?set in .env}
      ANTHROPIC_BASE_URL: https://llm.tapiavala.com
      ANTHROPIC_MODEL: meridian/claude-haiku-4-5
    volumes:
      # Always mounted. Holds embeddings index + viewer cache, plus
      # state_store.db and stream_store/ when running in file-based mode.
      # Safe to leave attached even when UPSTASH_REDIS_URL is set — the
      # Redis paths just don't write there.
      - agentmemory-data:/data
    labels:
      - "traefik.enable=true"

      # Only the MCP streamable_http bridge (3114) is exposed publicly.
      # The REST API (3111), stream WS (3112), viewer (3113), and iii
      # bridge (49134) stay docker-network-only — no off-the-shelf client
      # speaks those shapes, and the viewer is reachable via SSH port
      # forward when needed.
      - "traefik.http.services.agentmemory.loadbalancer.server.port=3114"
      - "traefik.http.routers.agentmemory.rule=Host(`memory.tapiavala.com`)"
      - "traefik.http.routers.agentmemory.entrypoints=websecure"
      - "traefik.http.routers.agentmemory.tls.certresolver=le"

      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  agentmemory-data:

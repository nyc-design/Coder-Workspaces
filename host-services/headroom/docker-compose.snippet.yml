# Append this service to the host docker-compose on the Coder VM.
#
# headroom (https://github.com/chopratejas/headroom) is a local
# compression proxy for AI agent traffic. Sits in front of one or more
# upstreams, compresses prompts/tool outputs/conversation history via the
# ContentRouter pipeline (SmartCrusher + Kompress + tool-result
# interceptors), and forwards on. Routing is path-based via env vars.
#
# All routing fits inline below — no host-side config file. If routing
# grows past ~10 lines or needs templating, promote to a file mount.
#
# Public URL: https://llm.tapiavala.com/headroom/* (Traefik strips prefix)
# Internal:   http://headroom:8787

services:
  headroom:
    image: ghcr.io/chopratejas/headroom:latest
    container_name: headroom
    restart: unless-stopped
    environment:
      HEADROOM_HOST: 0.0.0.0
      HEADROOM_PORT: 8787
      HEADROOM_MODE: token
      HEADROOM_TELEMETRY: "off"
      # NOTE: do NOT set HEADROOM_STATELESS=true — it disables all filesystem
      # writes, which means proxy_savings.json never persists (savings ledger
      # vanishes every restart) and --memory would be useless. We mount
      # /data and point HEADROOM_WORKSPACE_DIR there instead.
      HEADROOM_WORKSPACE_DIR: /data
      HEADROOM_CONFIG_DIR: /data/config

      # Path-based dispatch (verified in headroom/providers/registry.py:97-106).
      # Each request URL determines which upstream gets hit.
      ANTHROPIC_TARGET_API_URL: http://meridian:3456     # /v1/messages
      OPENAI_TARGET_API_URL: http://cliproxy:8317        # /v1/responses (Codex)
      GEMINI_TARGET_API_URL: http://cliproxy:8317        # /v1beta/...:generateContent
      CLOUDCODE_TARGET_API_URL: http://cliproxy:8317     # /v1internal:streamGenerateContent
                                                          # (Pi/Antigravity gemini-cli flows)
    volumes:
      # Persistent savings ledger, TOIN telemetry, subscription state,
      # license cache, optional memory.db. Keeping these on a volume means
      # watchtower image swaps don't reset compression-savings history.
      - headroom-data:/data
    labels:
      - "traefik.enable=true"

      - "traefik.http.services.headroom.loadbalancer.server.port=8787"
      - "traefik.http.routers.headroom.rule=Host(`llm.tapiavala.com`) && PathPrefix(`/headroom`)"
      - "traefik.http.routers.headroom.entrypoints=websecure"
      - "traefik.http.routers.headroom.tls.certresolver=le"
      - "traefik.http.routers.headroom.middlewares=headroom-strip"
      - "traefik.http.middlewares.headroom-strip.stripprefix.prefixes=/headroom"

      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  headroom-data:

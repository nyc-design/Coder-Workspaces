# CLIProxyAPI configuration baked into the coder-agents-sidecars image.
# Serves BOTH Codex (ChatGPT Plus/Pro OAuth) and Gemini (personal Google
# OAuth) from one process. Headroom dispatches /v1/responses (Codex) and
# /v1beta/...:generateContent (Gemini) here based on path.
#
# `__SIDECAR_SHARED_API_KEY__` is substituted at container startup by the
# cliproxy-sidecar s6 run script so the key can rotate without an image rebuild.

host: "127.0.0.1"
port: 8317

# Single auth-dir holds OAuth credential files for both providers, written by:
#   cli-proxy-api --auth-dir /data/auth/cliproxy --login codex
#   cli-proxy-api --auth-dir /data/auth/cliproxy --login gemini
# CLIProxyAPI auto-detects which credentials are present and serves whichever
# endpoints have valid auth.
auth-dir: "/data/auth/cliproxy"

# Local API key clients (Headroom in our case) must present on every request.
api-keys:
  - "__SIDECAR_SHARED_API_KEY__"

# Native Gemini endpoint shape — fantasy's Google provider hits this path.
enable-gemini-cli-endpoint: true

# Surface request errors as 4xx/5xx instead of silent retries so chatd can react.
disable-cooling: false
request-retry: 2
max-retry-interval: 15

# Don't forward client auth headers upstream; use OAuth credential files only.
passthrough-headers: false

# Restrict management API to localhost.
remote-management:
  allow-remote: false

logging-to-file: false
debug: false

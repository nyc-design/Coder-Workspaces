# Append this service to the host docker-compose on the Coder VM.
#
# Routing (via Traefik on llm.tapiavala.com):
#   https://llm.tapiavala.com/claude/  → Headroom :8787 → dispatcher :8788 → {meridian | cliproxy | kirocc}
#                                                       (prefix in `model`: meridian/ | subscription/ | kiro/)
#   https://llm.tapiavala.com/codex/   → Headroom :8787 → cliproxy-sidecar :8317 (Codex OAuth)
#   https://llm.tapiavala.com/gemini/  → Headroom :8787 → cliproxy-sidecar :8317 (Gemini OAuth)
#   https://llm.tapiavala.com/openai/  → dispatcher :8788  → {groq | cerebras | codestral | zen}
#                                                       (prefix in `model`: groq/ | cerebras/ | codestral/ | zen/)
#
# Use the same four URLs in Coder admin AND in any laptop/workspace CLI that takes
# a custom base URL (Claude Code's ANTHROPIC_BASE_URL, Codex's OPENAI_BASE_URL, etc.).
# All bear `Authorization: Bearer ${SIDECAR_SHARED_API_KEY}`; the dispatcher swaps
# in per-upstream credentials server-side for external lanes.
#
# After deploying:
#   1. Set GOOGLE_APPLICATION_CREDENTIALS_JSON in the host .env (one-line raw or
#      base64 SA JSON for sidecar-runtime@ai-sidecar-nt.iam.gserviceaccount.com).
#      All other credentials live in GCP Secret Manager project `ai-sidecar-nt`
#      and are fetched at container start by the bootstrap-secrets oneshot.
#   2. Point llm.tapiavala.com DNS at this host. Let's Encrypt (le) issues automatically.
#   3. docker compose pull coder-agents-sidecars && docker compose up -d coder-agents-sidecars
#   4. One-time browser logins (creds land in the named volume):
#        docker exec -it coder-agents-sidecars cli-proxy-api --auth-dir /data/auth/cliproxy --login codex
#        docker exec -it coder-agents-sidecars cli-proxy-api --auth-dir /data/auth/cliproxy --login gemini
#        docker exec -it coder-agents-sidecars cli-proxy-api --auth-dir /data/auth/cliproxy --login claude   # (optional subscription/ lane)
#      For the kiro/ lane: copy data.sqlite3 from a host that ran `kiro auth login`
#      into /data/auth/kirocc/ (see kirocc-sidecar/README.md).
#   5. docker restart coder-agents-sidecars
#   6. In Coder admin → AI Providers, paste these as base URLs (API key = SIDECAR_SHARED_API_KEY):
#        Anthropic    → https://llm.tapiavala.com/claude
#        OpenAI Codex → https://llm.tapiavala.com/codex
#        Google       → https://llm.tapiavala.com/gemini
#        OpenAI compat→ https://llm.tapiavala.com/openai   (groq/cerebras/codestral/zen)
services:
  coder-agents-sidecars:
    image: ghcr.io/nyc-design/host-services/coder-agents-sidecars:latest
    container_name: coder-agents-sidecars
    restart: unless-stopped
    environment:
      # Service-account JSON for GCP Secret Manager (project ai-sidecar-nt).
      # Everything else — SIDECAR_SHARED_API_KEY, CLAUDE_CODE_OAUTH_TOKEN,
      # GROQ_API_KEY, CEREBRAS_API_KEY, CODESTRAL_API_KEY, ZEN_API_KEY — is
      # fetched at startup by the bootstrap-secrets oneshot.
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${GOOGLE_APPLICATION_CREDENTIALS_JSON:?set in .env}
    volumes:
      - coder-agents-sidecars-auth:/data/auth
    # Direct host port left commented out — Traefik handles ingress. Uncomment
    # if you also want loopback access on the host VM for debugging:
    # ports:
    #   - "127.0.0.1:8787:8787"
    labels:
      - "traefik.enable=true"

      # Two backend service definitions: 8787 is Headroom (Claude/Codex/Gemini
      # pipeline), 8788 is the dispatcher (OpenAI-compat direct fan-out).
      - "traefik.http.services.coder-agents-sidecars.loadbalancer.server.port=8787"
      - "traefik.http.services.coder-agents-sidecars-dispatcher.loadbalancer.server.port=8788"

      # Three routers, one per provider subpath. All three forward to the same
      # backend; the stripPrefix middleware removes the /claude /codex /gemini
      # prefix so Headroom sees the native API path it expects.
      #
      # /claude/* → Anthropic Messages API path
      - "traefik.http.routers.cas-claude.rule=Host(`llm.tapiavala.com`) && PathPrefix(`/claude/`)"
      - "traefik.http.routers.cas-claude.entrypoints=websecure"
      - "traefik.http.routers.cas-claude.tls.certresolver=le"
      - "traefik.http.routers.cas-claude.service=coder-agents-sidecars"
      - "traefik.http.routers.cas-claude.middlewares=cas-claude-strip"
      - "traefik.http.middlewares.cas-claude-strip.stripprefix.prefixes=/claude"

      # /codex/* → OpenAI API root compatibility:
      # Coder/fantasy appends /responses directly to the configured base URL,
      # while Headroom expects /v1/responses. So:
      #   /codex/responses   -> rewrite -> /codex/v1/responses -> strip /codex
      # Requests that already include /codex/v1/* bypass the rewrite router.
      - "traefik.http.routers.cas-codex-v1.rule=Host(`llm.tapiavala.com`) && PathPrefix(`/codex/v1/`)"
      - "traefik.http.routers.cas-codex-v1.priority=200"
      - "traefik.http.routers.cas-codex-v1.entrypoints=websecure"
      - "traefik.http.routers.cas-codex-v1.tls.certresolver=le"
      - "traefik.http.routers.cas-codex-v1.service=coder-agents-sidecars"
      - "traefik.http.routers.cas-codex-v1.middlewares=cas-codex-strip"

      - "traefik.http.routers.cas-codex.rule=Host(`llm.tapiavala.com`) && PathPrefix(`/codex/`)"
      - "traefik.http.routers.cas-codex.priority=100"
      - "traefik.http.routers.cas-codex.entrypoints=websecure"
      - "traefik.http.routers.cas-codex.tls.certresolver=le"
      - "traefik.http.routers.cas-codex.service=coder-agents-sidecars"
      - "traefik.http.routers.cas-codex.middlewares=cas-codex-add-v1,cas-codex-strip"
      - "traefik.http.middlewares.cas-codex-add-v1.replacepathregex.regex=^/codex/(.*)"
      - "traefik.http.middlewares.cas-codex-add-v1.replacepathregex.replacement=/codex/v1/$$1"
      - "traefik.http.middlewares.cas-codex-strip.stripprefix.prefixes=/codex"

      # /gemini/* → Google generativelanguage v1beta path
      - "traefik.http.routers.cas-gemini.rule=Host(`llm.tapiavala.com`) && PathPrefix(`/gemini/`)"
      - "traefik.http.routers.cas-gemini.entrypoints=websecure"
      - "traefik.http.routers.cas-gemini.tls.certresolver=le"
      - "traefik.http.routers.cas-gemini.service=coder-agents-sidecars"
      - "traefik.http.routers.cas-gemini.middlewares=cas-gemini-strip"
      - "traefik.http.middlewares.cas-gemini-strip.stripprefix.prefixes=/gemini"

      # /openai/* → dispatcher directly (skipping Headroom; the OpenAI-compat
      # chat-completions shape doesn't pass through Headroom's compression
      # pipeline). Clients prefix `model` with groq/ | cerebras/ | codestral/ | zen/.
      - "traefik.http.routers.cas-openai.rule=Host(`llm.tapiavala.com`) && PathPrefix(`/openai/`)"
      - "traefik.http.routers.cas-openai.entrypoints=websecure"
      - "traefik.http.routers.cas-openai.tls.certresolver=le"
      - "traefik.http.routers.cas-openai.service=coder-agents-sidecars-dispatcher"
      - "traefik.http.routers.cas-openai.middlewares=cas-openai-strip"
      - "traefik.http.middlewares.cas-openai-strip.stripprefix.prefixes=/openai"

      # Watchtower auto-update opt-in (matches the coder-pwa pattern).
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  coder-agents-sidecars-auth:

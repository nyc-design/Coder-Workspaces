# CLIProxyAPI configuration baked into the coder-agents-sidecars image.
# `__SIDECAR_SHARED_API_KEY__` is substituted at container startup by the
# gemini-sidecar s6 run script (so the key can rotate without an image rebuild).

host: "127.0.0.1"
port: 8317

# OAuth credential files written by:
#   cli-proxy-api --auth-dir /data/auth/gemini --login gemini
auth-dir: "/data/auth/gemini"

# Local API key clients (Headroom in our case) must present.
api-keys:
  - "__SIDECAR_SHARED_API_KEY__"

# Native Gemini endpoint shape — fantasy's Google provider hits this path.
enable-gemini-cli-endpoint: true

# Surface request errors as 4xx/5xx instead of silent retries so chatd can react.
disable-cooling: false
request-retry: 2
max-retry-interval: 15

# Don't forward client auth headers to Google; use OAuth credential file only.
passthrough-headers: false

# Restrict management API to localhost.
remote-management:
  allow-remote: false

logging-to-file: false
debug: false

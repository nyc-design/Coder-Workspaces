server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;

    # Redirect bare /install-pwa to /install-pwa/ so typing either works.
    location = /install-pwa {
        return 301 /install-pwa/;
    }

    location = /install-pwa/healthz {
        access_log off;
        return 200 "ok\n";
        default_type text/plain;
    }

    # Service worker must be served with Service-Worker-Allowed so its scope
    # can extend to the whole origin (/), not just /install-pwa/.
    location = /install-pwa/sw.js {
        default_type application/javascript;
        add_header Cache-Control "no-cache" always;
        add_header Service-Worker-Allowed "/" always;
    }

    location = /install-pwa/manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=300" always;
    }

    location /install-pwa/ {
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=300" always;
    }

    # Anything outside /install-pwa/ shouldn't reach us (Traefik only routes
    # the prefix), but return 404 defensively if it does.
    location / {
        return 404;
    }
}

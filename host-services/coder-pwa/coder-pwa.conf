server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;

    # Health check for Traefik / liveness.
    location = /pwa-shell/healthz {
        access_log off;
        return 200 "ok\n";
        default_type text/plain;
    }

    # The service worker must be served with Service-Worker-Allowed so its
    # scope can extend to the whole origin (/), not just /pwa-shell/.
    location = /pwa-shell/sw.js {
        default_type application/javascript;
        add_header Cache-Control "no-cache" always;
        add_header Service-Worker-Allowed "/" always;
    }

    location = /pwa-shell/manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=300" always;
    }

    # Install page + icons — plain static serving.
    location /pwa-shell/ {
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=300" always;
    }

    # Anything outside /pwa-shell/ shouldn't reach us (Traefik only routes the
    # prefix), but return 404 defensively if it does.
    location / {
        return 404;
    }
}

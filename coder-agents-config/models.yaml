# Chat model configs for Coder Agents (chatd).
# Synced to /api/experimental/chats/model-configs by update-coder-agents-config.yaml.
#
# Stable identity: (provider, model) tuple.
#
# DECLARATIVE: this file is the source of truth for models. Models present in
# the Coder admin UI but NOT listed here will be DELETED on sync. To preserve
# a model, add it here. (Providers and MCP servers remain additive — only
# models are declaratively synced.)
#
# Schema reference: codersdk.CreateChatModelConfigRequest in coder/coder.
#   - Top-level: provider, model, display_name, enabled, is_default,
#     context_limit, compression_threshold, model_config{}
#   - Inside model_config: max_output_tokens, temperature, top_p, top_k,
#     presence_penalty, frequency_penalty, cost{}, provider_options{}
#   - Inside cost: input_price_per_million_tokens, output_price_per_million_tokens,
#     cache_read_price_per_million_tokens, cache_write_price_per_million_tokens
#     (USD per million tokens, floats)
#   - Inside provider_options: one of anthropic{} / openai{} / google{} / etc.
#
# Cost values below are vendor public-pricing snapshots (May 2026). Update
# when vendors change pricing, or run `./sync.sh pull` to refresh from your
# current Coder admin state into this file.

models:
  # ─── Anthropic (Claude Pro/Max via sidecar) ──────────────────────────────
  - provider: anthropic
    model: claude-sonnet-4-6
    display_name: Sonnet 4.6
    context_limit: 200000
    is_default: true
    model_config:
      cost:
        input_price_per_million_tokens: 3.00
        output_price_per_million_tokens: 15.00
        cache_read_price_per_million_tokens: 0.30
        cache_write_price_per_million_tokens: 3.75

  - provider: anthropic
    model: claude-opus-4-7
    display_name: Opus 4.7
    context_limit: 200000
    model_config:
      cost:
        input_price_per_million_tokens: 15.00
        output_price_per_million_tokens: 75.00
        cache_read_price_per_million_tokens: 1.50
        cache_write_price_per_million_tokens: 18.75
      provider_options:
        anthropic:
          send_reasoning: true
          thinking:
            budget_tokens: 16000
          effort: high

  - provider: anthropic
    model: claude-haiku-4-5-20251001
    display_name: Haiku 4.5
    context_limit: 200000
    model_config:
      cost:
        input_price_per_million_tokens: 1.00
        output_price_per_million_tokens: 5.00
        cache_read_price_per_million_tokens: 0.10
        cache_write_price_per_million_tokens: 1.25

  # ─── OpenAI / Codex (ChatGPT Plus subscription via sidecar) ──────────────
  - provider: openai
    model: gpt-5-codex
    display_name: GPT-5 Codex
    context_limit: 272000
    model_config:
      cost:
        input_price_per_million_tokens: 1.25
        output_price_per_million_tokens: 10.00
        cache_read_price_per_million_tokens: 0.125
      provider_options:
        openai:
          reasoning_effort: high

  # ─── Google Gemini (subscription via sidecar) ────────────────────────────
  - provider: google
    model: gemini-2.5-pro
    display_name: Gemini 2.5 Pro
    context_limit: 1000000
    model_config:
      cost:
        input_price_per_million_tokens: 1.25
        output_price_per_million_tokens: 5.00

  - provider: google
    model: gemini-2.5-flash
    display_name: Gemini 2.5 Flash
    context_limit: 1000000
    model_config:
      cost:
        input_price_per_million_tokens: 0.075
        output_price_per_million_tokens: 0.30

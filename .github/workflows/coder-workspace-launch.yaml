name: Create Coder Workspace

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Who is the workspace for?"
        type: choice
        options: [self, agent]
        default: agent
  workflow_call:
    inputs:
      mode:
        description: "Who is the workspace for?"
        required: false
        type: string
        default: "agent"
    secrets:
      CODER_URL:
        required: true
      CODER_SESSION_TOKEN:
        required: true
      GCP_PROJECT:
        required: false

permissions:
  contents: read

jobs:
  create-workspace:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Coder CLI
        uses: coder/setup-action@v1
        with:
          access_url: ${{ secrets.CODER_URL }}
          coder_session_token: ${{ secrets.CODER_SESSION_TOKEN }}

      - name: Create or start workspace
        env:
          MODE: ${{ inputs.mode }}
          REPO_NAME: ${{ github.event.repository.name }}
          CODER_URL: ${{ secrets.CODER_URL }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
        run: |
          set -euo pipefail

          echo "Coder identity:"
          coder whoami || true
          echo "Checking github-auth external auth for this token..."
          if ! coder external-auth access-token github-auth >/dev/null 2>&1; then
            echo "WARNING: github-auth is not configured for the user behind CODER_SESSION_TOKEN."
            echo "Workspace creation may fail when template reads data.coder_external_auth.github."
          else
            echo "github-auth is configured."
          fi

          mode="$(echo "${MODE:-self}" | tr '[:upper:]' '[:lower:]')"

          workspace_name="$REPO_NAME"
          template="repo-envbuilder"

          # Always provide gcp_project_name (empty string allowed) to avoid interactive prompts
          gcp_project="${GCP_PROJECT:-}"
          params=(
            --parameter is_existing_project=existing
            --parameter repo_name="$REPO_NAME"
            --parameter gcp_project_name="$gcp_project"
          )

          preset=""

          if [ "$mode" = "agent" ]; then
            workspace_name="${REPO_NAME}-Agents"
            params+=(--parameter workspace_mode=agent)
          fi

          echo "Mode: $mode"
          echo "Workspace: $workspace_name"
          echo "Template: $template"
          echo "Parameters: ${params[*]}"

          existing_json="$(coder ls --output json || echo "[]")"
          exists="$(echo "$existing_json" | jq -e --arg NAME "$workspace_name" 'map(.name == $NAME) | any' >/dev/null 2>&1 && echo "true" || echo "false")"

          if [ "$exists" = "true" ]; then
            echo "Workspace '$workspace_name' already exists. Starting (if stopped)..."
            coder --verbose start "$workspace_name" --yes || true
          else
            echo "Creating workspace '$workspace_name' with template '$template'..."
            if [ -n "${preset:-}" ]; then
              coder create "$workspace_name" --template "$template" --preset "$preset" "${params[@]}" --yes
            else
              # Don't pass --preset at all if you don't want one (avoid treating "none" as a preset name)
              coder create "$workspace_name" --template "$template" "${params[@]}" --yes
            fi
          fi

          status="$(coder ls --output json | jq -r --arg NAME "$workspace_name" 'map(select(.name==$NAME))[0].status')"
          owner="$(coder ls --output json | jq -r --arg NAME "$workspace_name" 'map(select(.name==$NAME))[0].owner_name // ""')"

          if [ -n "$owner" ] && [ "$owner" != "null" ]; then
            url="${CODER_URL%/}/@${owner}/${workspace_name}"
          else
            url="${CODER_URL%/}/workspaces/${workspace_name}"
          fi

          {
            echo "WORKSPACE_NAME=$workspace_name"
            echo "WORKSPACE_STATUS=$status"
            echo "WORKSPACE_URL=$url"
            echo "MODE=$mode"
          } >> "$GITHUB_ENV"

      - name: Summary
        env:
          MODE: ${{ env.MODE }}
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          Workspace: $WORKSPACE_NAME  
          Template: repo-envbuilder$([[ "$MODE" == "agent" ]] && echo " (agent mode)" || echo "")
          Status: $WORKSPACE_STATUS  
          Link: $WORKSPACE_URL
          EOF

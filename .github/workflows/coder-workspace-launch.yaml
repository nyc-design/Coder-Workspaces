name: Create Coder Workspace

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Who is the workspace for?"
        type: choice
        options: [self, agent]
        default: agent
  workflow_call:
    inputs:
      mode:
        description: "Who is the workspace for?"
        required: false
        type: string
        default: "agent"
    secrets:
      # GCP_PROJECT stays per-repo because each repo may live in a different
      # GCP project (or none). Optional — leave unset for repos that don't
      # use GCP integration. CODER_URL and CODER_SESSION_TOKEN are pulled
      # from GCP Secret Manager via WIF, no per-repo setup needed for those.
      GCP_PROJECT:
        required: false

permissions:
  contents: read
  id-token: write   # required for GCP Workload Identity Federation

jobs:
  create-workspace:
    runs-on: ubuntu-latest
    steps:
      # WIF identifiers are hardcoded so external nyc-design repos can call
      # this workflow with zero GCP/Variable setup of their own — they just
      # need `permissions: id-token: write` on the calling job. These values
      # aren't secrets; they identify the auth path. Only OIDC tokens with
      # repository_owner=='nyc-design' satisfy the binding.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/547043252101/locations/global/workloadIdentityPools/github/providers/this-repo
          service_account: coder-gha-secrets@coder-nt.iam.gserviceaccount.com

      - name: Fetch Coder secrets from GCP Secret Manager
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          export_to_environment: true
          secrets: |-
            CODER_URL:coder-nt/CODER_URL
            CODER_SESSION_TOKEN:coder-nt/CODER_SESSION_TOKEN

      - name: Setup Coder CLI
        uses: coder/setup-action@v1
        with:
          access_url: ${{ env.CODER_URL }}
          coder_session_token: ${{ env.CODER_SESSION_TOKEN }}

      - name: Create or start workspace
        env:
          MODE: ${{ inputs.mode }}
          REPO_NAME: ${{ github.event.repository.name }}
          # GCP_PROJECT is per-repo (each repo may target a different GCP
          # project, or none). Pulled from the calling repo's GH Actions
          # secrets via the workflow_call secrets block. Empty if unset —
          # the workspace template handles empty as "no GCP integration".
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
        run: |
          set -euo pipefail

          mode="$(echo "${MODE:-self}" | tr '[:upper:]' '[:lower:]')"

          workspace_name="$REPO_NAME"
          template="project-workspace"

          # Always provide gcp_project_name (empty string allowed) to avoid interactive prompts
          gcp_project="${GCP_PROJECT:-}"
          params=(
            --parameter workspace_mode="$mode"
            --parameter is_existing_project=existing
            --parameter repo_name="$REPO_NAME"
            --parameter gcp_project_name="$gcp_project"
          )

          preset=""

          if [ "$mode" = "agent" ]; then
            workspace_name="${REPO_NAME}-Agents"
          fi

          existing_json="$(coder ls --output json || echo "[]")"
          exists="$(echo "$existing_json" | jq -e --arg NAME "$workspace_name" 'map(.name == $NAME) | any' >/dev/null 2>&1 && echo "true" || echo "false")"

          if [ "$exists" = "true" ]; then
            echo "Workspace '$workspace_name' already exists. Starting (if stopped)..."
            coder start "$workspace_name" --yes || true
          else
            echo "Creating workspace '$workspace_name' with template '$template'..."
            if [ -n "${preset:-}" ]; then
              coder create "$workspace_name" --template "$template" --preset "$preset" "${params[@]}" --yes
            else
              # Don't pass --preset at all if you don't want one (avoid treating "none" as a preset name)
              coder create "$workspace_name" --template "$template" "${params[@]}" --yes
            fi
          fi

          status="$(coder ls --output json | jq -r --arg NAME "$workspace_name" 'map(select(.name==$NAME))[0].status')"
          owner="$(coder ls --output json | jq -r --arg NAME "$workspace_name" 'map(select(.name==$NAME))[0].owner_name // ""')"

          if [ -n "$owner" ] && [ "$owner" != "null" ]; then
            url="${CODER_URL%/}/@${owner}/${workspace_name}"
          else
            url="${CODER_URL%/}/workspaces/${workspace_name}"
          fi

          {
            echo "WORKSPACE_NAME=$workspace_name"
            echo "WORKSPACE_STATUS=$status"
            echo "WORKSPACE_URL=$url"
            echo "MODE=$mode"
          } >> "$GITHUB_ENV"

      - name: Summary
        env:
          MODE: ${{ env.MODE }}
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          Workspace: $WORKSPACE_NAME
          Template: project-workspace$([[ "$MODE" == "agent" ]] && echo " (agent mode)" || echo "")
          Status: $WORKSPACE_STATUS
          Link: $WORKSPACE_URL
          EOF

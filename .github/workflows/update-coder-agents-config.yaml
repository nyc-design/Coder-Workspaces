name: Update Coder Agents central config

on:
  push:
    branches:
      - main
    paths:
      - "coder-agents-config/**"
      - ".github/workflows/update-coder-agents-config.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # github-hosted runners ship jq + yq + envsubst by default; verify so a
      # missing tool is loud rather than silent.
      - name: Verify tooling
        run: |
          command -v curl >/dev/null
          command -v jq >/dev/null
          command -v yq >/dev/null
          command -v envsubst >/dev/null

      - name: Sync providers / models / MCP servers / system prompt
        env:
          CODER_URL: ${{ secrets.CODER_URL }}
          CODER_SESSION_TOKEN: ${{ secrets.CODER_SESSION_TOKEN }}
          # Secret values referenced via ${...} in the YAML files. Add new ones
          # here when you reference new env vars in providers.yaml /
          # mcp-servers.yaml.
          SIDECAR_SHARED_API_KEY: ${{ secrets.SIDECAR_SHARED_API_KEY }}
          CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
          GITHUB_PAT: ${{ secrets.GH_PAT_FOR_MCP }}
        run: ./coder-agents-config/sync.sh coder-agents-config

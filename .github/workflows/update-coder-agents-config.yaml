name: Update Coder Agents central config

on:
  push:
    branches:
      - main
    paths:
      - "coder-agents-config/**"
      - ".github/workflows/update-coder-agents-config.yaml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for GCP Workload Identity Federation

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # github-hosted runners ship jq + yq + envsubst by default; verify so a
      # missing tool is loud rather than silent.
      - name: Verify tooling
        run: |
          command -v curl >/dev/null
          command -v jq >/dev/null
          command -v yq >/dev/null
          command -v envsubst >/dev/null

      # WIF identifiers are hardcoded for consistency with coder-workspace-launch.yaml.
      # See .github/SECRETS.md for what these are and how to regenerate if needed.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/547043252101/locations/global/workloadIdentityPools/github/providers/this-repo
          service_account: coder-gha-secrets@coder-nt.iam.gserviceaccount.com

      - name: Fetch secrets from GCP Secret Manager
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          export_to_environment: true
          # Local env names match ${VAR} placeholders in our YAML files.
          # GH_PAT_FOR_MCP avoids the GITHUB_ reserved prefix (which the
          # Actions runner is permissive about for env vars set via this
          # action, but using GH_ prefix is conventional and unambiguous).
          secrets: |-
            CODER_URL:coder-nt/CODER_URL
            CODER_SESSION_TOKEN:coder-nt/CODER_SESSION_TOKEN
            LLM_GATEWAY_API_KEY:coder-nt/LLM_GATEWAY_API_KEY
            CONTEXT7_API_KEY:coder-nt/CONTEXT7_API_KEY
            GH_PAT_FOR_MCP:coder-nt/GH_PAT_FOR_MCP
            AGENTMEMORY_SECRET:coder-nt/AGENTMEMORY_SECRET

      - name: Sync providers / models / MCP servers / system prompt / template-allowlist
        run: ./coder-agents-config/sync.sh coder-agents-config

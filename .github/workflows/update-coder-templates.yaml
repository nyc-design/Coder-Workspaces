name: Update Coder Templates

on:
  push:
    branches:
      - main
    paths:
      - "workspace-templates/**"
      - "workspace-modules/**"
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed_templates: ${{ steps.detect.outputs.changed_templates }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed template folders
        id: detect
        run: |
          set -euo pipefail

          ALL_TEMPLATES="$(find workspace-templates -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort)"

          # Get list of changed files in the last commit
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # For manual runs, update all templates
            CHANGED_DIRS="$(echo "$ALL_TEMPLATES" | jq -R -s -c 'split("\n")[:-1]')"
          else
            # Get changed files for the entire push range (supports merge commits and multi-commit pushes)
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"

            if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              CHANGED_FILES="$(git diff --name-only HEAD~1 HEAD)"
            else
              CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
            fi

            TEMPLATE_CHANGES="$(
              echo "$CHANGED_FILES" \
              | awk -F'/' '/^workspace-templates\/[^/]+\// {print $2}' \
              | sort -u
            )"

            CHANGED_MODULES="$(
              echo "$CHANGED_FILES" \
              | awk -F'/' '/^workspace-modules\/[^/]+\// {print $2}' \
              | sort -u
            )"

            AFFECTED_BY_MODULES=""
            if [ -n "$CHANGED_MODULES" ]; then
              while IFS= read -r template; do
                [ -z "$template" ] && continue
                while IFS= read -r module; do
                  [ -z "$module" ] && continue
                  if grep -R -q "workspace-modules/${module}" "workspace-templates/${template}"; then
                    AFFECTED_BY_MODULES="${AFFECTED_BY_MODULES}${template}"$'\n'
                    break
                  fi
                done <<< "$CHANGED_MODULES"
              done <<< "$ALL_TEMPLATES"
            fi

            CHANGED_DIRS="$(
              printf "%s\n%s\n" "$TEMPLATE_CHANGES" "$AFFECTED_BY_MODULES" \
              | sed '/^$/d' \
              | sort -u \
              | jq -R -s -c 'split("\n")[:-1]'
            )"

            echo "Changed files:"
            echo "$CHANGED_FILES"
            echo "Template changes:"
            echo "$TEMPLATE_CHANGES"
            echo "Changed modules:"
            echo "$CHANGED_MODULES"
            echo "Templates affected by module changes:"
            echo "$AFFECTED_BY_MODULES"
          fi

          echo "changed_templates=$CHANGED_DIRS" >> $GITHUB_OUTPUT
          echo "Changed template directories: $CHANGED_DIRS"

  update-templates:
    needs: detect-changes
    if: needs.detect-changes.outputs.changed_templates != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for GCP Workload Identity Federation
    strategy:
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.changed_templates) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # WIF identifiers are hardcoded for consistency with coder-workspace-launch.yaml.
      # See .github/SECRETS.md for what these are and how to regenerate if needed.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/547043252101/locations/global/workloadIdentityPools/github/providers/this-repo
          service_account: coder-gha-secrets@coder-nt.iam.gserviceaccount.com

      - name: Fetch Coder secrets from GCP Secret Manager
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          export_to_environment: true
          secrets: |-
            CODER_URL:coder-nt/CODER_URL
            CODER_SESSION_TOKEN:coder-nt/CODER_SESSION_TOKEN

      - name: Get latest commit hash
        id: latest_commit
        run: echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get commit title
        id: commit_title
        run: echo "title=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT

      - name: Check if template directory exists
        id: check_dir
        run: |
          if [ -d "workspace-templates/${{ matrix.template }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Template directory workspace-templates/${{ matrix.template }} exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Template directory workspace-templates/${{ matrix.template }} does not exist (might be deleted)"
          fi

      - name: Update Coder Template (push new version)
        if: steps.check_dir.outputs.exists == 'true'
        uses: matifali/update-coder-template@v3
        with:
          id: ${{ matrix.template }}
          dir: workspace-templates/${{ matrix.template }}
          url: ${{ env.CODER_URL }}
          name: ${{ steps.latest_commit.outputs.hash }}
          message: ${{ steps.commit_title.outputs.title }}
          activate: true
          coder_session_token: ${{ env.CODER_SESSION_TOKEN }}

      # Template-level metadata (display name, description, icon) is independent
      # of versioned Terraform pushes. Coder Agents picks templates by these
      # fields, so they're worth keeping in sync. Each is set from a sibling
      # txt file in the template directory; missing files are silently skipped.
      - name: Update template metadata (display_name / description / icon)
        if: steps.check_dir.outputs.exists == 'true'
        env:
          TEMPLATE_DIR: workspace-templates/${{ matrix.template }}
          TEMPLATE_SLUG: ${{ matrix.template }}
        run: |
          set -euo pipefail

          DISPLAY_NAME_FILE="$TEMPLATE_DIR/display_name.txt"
          DESCRIPTION_FILE="$TEMPLATE_DIR/description.txt"
          ICON_FILE="$TEMPLATE_DIR/icon.txt"

          if [ ! -f "$DISPLAY_NAME_FILE" ] && [ ! -f "$DESCRIPTION_FILE" ] && [ ! -f "$ICON_FILE" ]; then
            echo "No metadata files in $TEMPLATE_DIR, skipping metadata update."
            exit 0
          fi

          AUTH_HEADER="Coder-Session-Token: $CODER_SESSION_TOKEN"

          # Resolve template UUID by slug. Coder's PATCH endpoint requires the
          # template ID, not its name. The list endpoint returns all templates
          # the session can see; we filter by name (slug) here.
          TEMPLATE_ID=$(
            curl -fsSL -H "$AUTH_HEADER" "$CODER_URL/api/v2/templates" \
              | jq -r --arg name "$TEMPLATE_SLUG" '.[] | select(.name == $name) | .id' \
              | head -n1
          )
          if [ -z "$TEMPLATE_ID" ] || [ "$TEMPLATE_ID" = "null" ]; then
            echo "Could not resolve template UUID for slug '$TEMPLATE_SLUG'. Skipping metadata update." >&2
            exit 0
          fi

          # Build PATCH body. Only include fields whose source file exists, so
          # missing display_name.txt doesn't blank out the existing display name.
          BODY='{}'
          if [ -f "$DISPLAY_NAME_FILE" ]; then
            VAL="$(cat "$DISPLAY_NAME_FILE" | sed -e 's/[[:space:]]*$//' | head -c 64)"
            BODY=$(echo "$BODY" | jq --arg v "$VAL" '. + {display_name: $v}')
          fi
          if [ -f "$DESCRIPTION_FILE" ]; then
            # Coder caps description at ~128 chars in some places; we store the
            # long-form here. If the API rejects, truncate. Remove trailing nl.
            VAL="$(cat "$DESCRIPTION_FILE" | sed -e 's/[[:space:]]*$//')"
            BODY=$(echo "$BODY" | jq --arg v "$VAL" '. + {description: $v}')
          fi
          if [ -f "$ICON_FILE" ]; then
            VAL="$(cat "$ICON_FILE" | tr -d '[:space:]')"
            BODY=$(echo "$BODY" | jq --arg v "$VAL" '. + {icon: $v}')
          fi

          echo "PATCH body for $TEMPLATE_SLUG ($TEMPLATE_ID):"
          echo "$BODY" | jq

          curl -fsSL -X PATCH \
            -H "$AUTH_HEADER" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "$CODER_URL/api/v2/templates/$TEMPLATE_ID" \
            | jq '{name, display_name, description, icon}'

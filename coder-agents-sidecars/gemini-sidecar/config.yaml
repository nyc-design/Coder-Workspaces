# CLIProxyAPI configuration for the Gemini sidecar.
# Only the Gemini CLI OAuth path is enabled here; Codex/Claude live in dedicated
# sidecars. To re-enable other providers, add their credentials to auth-dir and
# uncomment the relevant blocks.

host: "0.0.0.0"
port: 8317

# Where OAuth credential files written by `cli-proxy-api --login` are stored.
# Mounted from the host so credentials survive container restarts.
auth-dir: "/data/auth"

# Local API key clients must present (Bearer or x-goog-api-key). Set in .env
# and inject via env-substitution at compose time.
api-keys:
  - "${CLIPROXY_API_KEY}"

# Native Gemini endpoint shape — fantasy's Google provider hits this path.
enable-gemini-cli-endpoint: true

# Surface request errors as 4xx/5xx instead of silent retries so chatd can
# react instead of hanging.
disable-cooling: false
request-retry: 2
max-retry-interval: 15

# Don't forward client auth headers to Google — we want to use the OAuth
# credential file exclusively.
passthrough-headers: false

# Restrict management API to localhost (i.e. unreachable from outside the
# container network). No remote-config attack surface.
remote-management:
  allow-remote: false

logging-to-file: false
debug: false

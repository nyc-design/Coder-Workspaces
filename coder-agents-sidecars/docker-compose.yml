# Coder Agents subscription-auth sidecars + Headroom compressor.
#
# Topology:
#   coderd ──► headroom :8787 ──┬──► claude-sidecar :3456 (Meridian + Claude SDK) ──► api.anthropic.com
#                               ├──► codex-sidecar  :8080 (codex-bridge)          ──► chatgpt.com/backend-api/codex
#                               └──► gemini-sidecar :8317 (CLIProxyAPI)           ──► generativelanguage.googleapis.com
#
# All three sidecars draw on the user's Pro/Max/Plus subscription quota instead of
# pay-as-you-go API billing. See README.md for Coder admin wiring.

name: coder-agents-sidecars

networks:
  sidecars:
    driver: bridge

services:
  claude-sidecar:
    build:
      context: ./claude-sidecar
      args:
        MERIDIAN_VERSION: ${MERIDIAN_VERSION:-latest}
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-latest}
    image: coder-agents/claude-sidecar:local
    container_name: coder-agents-claude-sidecar
    restart: unless-stopped
    networks: [sidecars]
    environment:
      MERIDIAN_HOST: 0.0.0.0
      MERIDIAN_PORT: "3456"
      MERIDIAN_PASSTHROUGH: "1"
      MERIDIAN_API_KEY: ${SIDECAR_SHARED_API_KEY}
      # Token-only auth (Option A in claude-sidecar/README.md).
      # Comment out and uncomment the volume below to use credential-dir auth instead.
      MERIDIAN_PROFILES: '[{"id":"default","oauthToken":"${CLAUDE_CODE_OAUTH_TOKEN}"}]'
      MERIDIAN_DEFAULT_PROFILE: default
    # volumes:
    #   - ${CLAUDE_HOME:-~/.claude}:/home/sidecar/.claude
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:3456/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  codex-sidecar:
    build:
      context: ./codex-sidecar
      args:
        CODEX_BRIDGE_REF: ${CODEX_BRIDGE_REF:-main}
    image: coder-agents/codex-sidecar:local
    container_name: coder-agents-codex-sidecar
    restart: unless-stopped
    networks: [sidecars]
    environment:
      CODEX_BRIDGE_HOST: 0.0.0.0
      CODEX_BRIDGE_PORT: "8080"
      CODEX_BRIDGE_API_KEY: ${SIDECAR_SHARED_API_KEY}
    volumes:
      # Codex CLI auth dir. Bootstrap on host with `codex login`, then mount.
      - ${CODEX_HOME:-./codex-sidecar/auth}:/home/sidecar/.codex
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  gemini-sidecar:
    image: ${CLI_PROXY_IMAGE:-eceasy/cli-proxy-api:latest}
    container_name: coder-agents-gemini-sidecar
    restart: unless-stopped
    networks: [sidecars]
    command: ["--config", "/etc/cli-proxy/config.yaml"]
    environment:
      CLIPROXY_API_KEY: ${SIDECAR_SHARED_API_KEY}
    volumes:
      - ./gemini-sidecar/config.yaml:/etc/cli-proxy/config.yaml:ro
      # OAuth credential files written by `cli-proxy-api --login gemini`.
      - ${GEMINI_SIDECAR_AUTH_DIR:-./gemini-sidecar/auth}:/data/auth
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:8317/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  headroom:
    image: ${HEADROOM_IMAGE:-ghcr.io/chopratejas/headroom:latest}
    container_name: coder-agents-headroom
    restart: unless-stopped
    networks: [sidecars]
    ports:
      - "${HEADROOM_PUBLIC_PORT:-8787}:8787"
    environment:
      HEADROOM_HOST: 0.0.0.0
      HEADROOM_PORT: "8787"
      HEADROOM_MODE: ${HEADROOM_MODE:-token}
      HEADROOM_STATELESS: "true"
      HEADROOM_TELEMETRY: ${HEADROOM_TELEMETRY:-off}
      ANTHROPIC_TARGET_API_URL: http://claude-sidecar:3456
      OPENAI_TARGET_API_URL: http://codex-sidecar:8080
      GEMINI_TARGET_API_URL: http://gemini-sidecar:8317
      CLOUDCODE_TARGET_API_URL: http://gemini-sidecar:8317
    depends_on:
      claude-sidecar: {condition: service_healthy}
      codex-sidecar:  {condition: service_healthy}
      gemini-sidecar: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8787/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
